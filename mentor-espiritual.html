<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Espiritual IA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --cream: #f5f0e8;
    --cream-dark: #ede5d0;
    --ink: #1a1612;
    --ink-soft: #3d3328;
    --ink-muted: #6b5d4f;
    --parchment: #faf7f0;
    --shadow-deep: rgba(10,6,2,0.6);
  }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: var(--ink);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 100% 100%, rgba(120,80,30,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 0% 50%, rgba(201,168,76,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grain texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 56px;
    animation: fadeDown 1s ease both;
  }

  .cross-ornament {
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 20px;
    margin-bottom: 24px;
    display: block;
    opacity: 0.7;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 400;
    letter-spacing: 0.15em;
    color: var(--gold-light);
    text-transform: uppercase;
    line-height: 1.3;
  }

  h1 em {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.55em;
    letter-spacing: 0.3em;
    color: var(--cream);
    opacity: 0.6;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px auto 0;
    max-width: 280px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0.4;
  }

  .divider-symbol {
    color: var(--gold);
    font-size: 14px;
    opacity: 0.6;
  }

  /* ── Verse of Day ── */
  .verse-of-day {
    background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, rgba(201,168,76,0.03) 100%);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 4px;
    padding: 24px 28px;
    margin-bottom: 40px;
    position: relative;
    animation: fadeUp 1s ease 0.2s both;
  }

  .verse-of-day::before {
    content: '❝';
    position: absolute;
    top: -14px;
    left: 20px;
    font-size: 40px;
    color: var(--gold);
    opacity: 0.3;
    line-height: 1;
  }

  .verse-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 12px;
  }

  .verse-text {
    font-style: italic;
    font-size: 17px;
    line-height: 1.7;
    color: var(--cream);
    opacity: 0.9;
  }

  .verse-ref {
    margin-top: 10px;
    font-size: 13px;
    color: var(--gold-light);
    opacity: 0.7;
    text-align: right;
  }

  /* ── Input area ── */
  .input-section {
    animation: fadeUp 1s ease 0.35s both;
  }

  .input-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 14px;
    display: block;
  }

  textarea {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 4px;
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    line-height: 1.7;
    padding: 20px 22px;
    resize: none;
    height: 140px;
    outline: none;
    transition: border-color 0.3s, background 0.3s;
    caret-color: var(--gold);
  }

  textarea::placeholder {
    color: var(--cream);
    opacity: 0.25;
    font-style: italic;
  }

  textarea:focus {
    border-color: rgba(201,168,76,0.5);
    background: rgba(255,255,255,0.05);
  }

  /* ── Theme pills ── */
  .themes {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }

  .theme-pill {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 100px;
    color: var(--cream);
    opacity: 0.55;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    padding: 5px 14px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .theme-pill:hover, .theme-pill.active {
    background: var(--gold-dim);
    border-color: rgba(201,168,76,0.6);
    opacity: 1;
    color: var(--gold-light);
  }

  /* ── Button ── */
  .btn-pray {
    width: 100%;
    margin-top: 24px;
    background: linear-gradient(135deg, #b8922a 0%, #d4a843 50%, #b8922a 100%);
    border: none;
    border-radius: 4px;
    color: var(--ink);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    font-weight: 600;
    padding: 18px 32px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.3s, transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 4px 24px rgba(201,168,76,0.2);
    position: relative;
    overflow: hidden;
  }

  .btn-pray::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  }

  .btn-pray:hover:not(:disabled) {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(201,168,76,0.35);
  }

  .btn-pray:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-pray:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── Response card ── */
  .response-card {
    margin-top: 48px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
    pointer-events: none;
  }

  .response-card.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  .response-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .response-header::before, .response-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);
  }

  .response-header span {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    opacity: 0.7;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Scripture block */
  .scripture-block {
    background: linear-gradient(135deg, rgba(201,168,76,0.07) 0%, rgba(201,168,76,0.02) 100%);
    border-left: 3px solid var(--gold);
    border-radius: 0 4px 4px 0;
    padding: 22px 24px;
    margin-bottom: 28px;
    position: relative;
  }

  .scripture-verse {
    font-style: italic;
    font-size: 20px;
    line-height: 1.75;
    color: var(--cream);
    margin-bottom: 10px;
  }

  .scripture-ref {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--gold-light);
    opacity: 0.8;
  }

  /* AI message */
  .ai-message {
    font-size: 17px;
    line-height: 1.85;
    color: var(--cream);
    opacity: 0.88;
    margin-bottom: 28px;
    white-space: pre-wrap;
  }

  /* Prayer block */
  .prayer-block {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 4px;
    padding: 22px 24px;
    text-align: center;
  }

  .prayer-icon {
    font-size: 22px;
    margin-bottom: 10px;
    display: block;
  }

  .prayer-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .prayer-text {
    font-style: italic;
    font-size: 16px;
    line-height: 1.8;
    color: var(--cream);
    opacity: 0.7;
  }

  .prayer-amen {
    margin-top: 14px;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--gold-light);
    opacity: 0.8;
  }

  /* ── Loading ── */
  .loading {
    text-align: center;
    padding: 40px 0;
    display: none;
  }

  .loading.active { display: block; }

  .flame {
    font-size: 32px;
    display: inline-block;
    animation: flicker 1.5s ease-in-out infinite alternate;
  }

  .loading-text {
    margin-top: 14px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
    animation: pulse 2s ease infinite;
  }

  /* ── History ── */
  .history-section {
    margin-top: 64px;
    animation: fadeUp 1s ease 0.5s both;
  }

  .history-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-align: center;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .history-item {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 4px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .history-item:hover {
    border-color: rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.05);
  }

  .history-item-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.4;
    margin-top: 7px;
    flex-shrink: 0;
  }

  .history-item-text {
    font-size: 15px;
    color: var(--cream);
    opacity: 0.6;
    line-height: 1.5;
    font-style: italic;
  }

  .history-item-ref {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--gold);
    opacity: 0.5;
    margin-top: 4px;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid rgba(201,168,76,0.1);
    animation: fadeUp 1s ease 0.6s both;
  }

  footer p {
    font-size: 13px;
    color: var(--cream);
    opacity: 0.25;
    letter-spacing: 0.08em;
    font-style: italic;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes flicker {
    0%   { transform: scaleY(1)   rotate(-2deg); opacity: 0.8; }
    100% { transform: scaleY(1.1) rotate(2deg);  opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 0.9; }
  }

  @keyframes typewriter {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .char {
    display: inline;
    animation: typewriter 0.03s ease both;
  }

  /* ── Error state ── */
  .error-msg {
    background: rgba(200, 60, 60, 0.08);
    border: 1px solid rgba(200,60,60,0.25);
    border-radius: 4px;
    padding: 14px 18px;
    font-size: 15px;
    color: #e88;
    margin-top: 20px;
    display: none;
  }

  .error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <header>
    <span class="cross-ornament">✦ ✝ ✦</span>
    <h1>Mentor Espiritual
      <em>Guiado pela Palavra</em>
    </h1>
    <div class="divider"><span class="divider-symbol">✦</span></div>
  </header>

  <!-- Versículo do dia -->
  <div class="verse-of-day" id="verseOfDay">
    <div class="verse-label">✦ Palavra para hoje</div>
    <div class="verse-text" id="verseText">Carregando...</div>
    <div class="verse-ref" id="verseRef"></div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <label class="input-label">✦ Partilhe o que está no seu coração</label>
    <textarea id="userInput" placeholder="Escreva livremente… sobre seu medo, angústia, pecado, gratidão, dúvida. Deus ouve tudo." rows="5"></textarea>

    <!-- Temas rápidos -->
    <div class="themes">
      <button class="theme-pill" onclick="selectTheme(this, 'Estou sentindo medo e incerteza sobre o futuro')">😨 Medo</button>
      <button class="theme-pill" onclick="selectTheme(this, 'Estou com muita ansiedade e preocupação')">😰 Ansiedade</button>
      <button class="theme-pill" onclick="selectTheme(this, 'Estou triste e com o coração pesado')">😢 Tristeza</button>
      <button class="theme-pill" onclick="selectTheme(this, 'Me sinto completamente sozinho e abandonado')">🕊️ Solidão</button>
      <button class="theme-pill" onclick="selectTheme(this, 'Errei e me sinto carregado de culpa pelo pecado')">🙏 Pecado</button>
      <button class="theme-pill" onclick="selectTheme(this, 'Estou exausto e completamente cansado')">💤 Cansaço</button>
      <button class="theme-pill" onclick="selectTheme(this, 'Preciso fortalecer minha fé e esperança em Deus')">⭐ Fé</button>
      <button class="theme-pill" onclick="selectTheme(this, 'Quero expressar gratidão a Deus pelas bênçãos recebidas')">💛 Gratidão</button>
    </div>

    <button class="btn-pray" id="btnPray" onclick="receberConselho()">
      ✦ &nbsp; Receber Palavra e Conselho &nbsp; ✦
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <span class="flame">🕯️</span>
    <div class="loading-text">Meditando na Palavra...</div>
  </div>

  <!-- Resposta -->
  <div class="response-card" id="responseCard">
    <div class="response-header"><span>✦ Palavra para você ✦</span></div>

    <div class="scripture-block">
      <div class="scripture-verse" id="scriptureVerse"></div>
      <div class="scripture-ref" id="scriptureRef"></div>
    </div>

    <div class="ai-message" id="aiMessage"></div>

    <div class="prayer-block">
      <span class="prayer-icon">🙏</span>
      <div class="prayer-label">Oração</div>
      <div class="prayer-text" id="prayerText"></div>
      <div class="prayer-amen">— Amém</div>
    </div>
  </div>

  <!-- Histórico -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-title">✦ Conversas anteriores</div>
    <div class="history-list" id="historyList"></div>
  </div>

  <!-- Footer -->
  <footer>
    <p>"A tua palavra é lâmpada que ilumina os meus passos e luz que clareia o meu caminho." — Salmos 119:105</p>
  </footer>

</div>

<script>
// ══════════════════════════════
// BANCO DE VERSÍCULOS LOCAL
// ══════════════════════════════
const versiculos = [
  { tema: "medo",      referencia: "Salmos 27:1",        texto: "O Senhor é a minha luz e salvação; a quem temerei? O Senhor é a força da minha vida; a quem me recearei?" },
  { tema: "medo",      referencia: "Isaías 41:10",        texto: "Não temas, porque eu sou contigo; não te assombres, porque eu sou o teu Deus; eu te fortaleço, e te ajudo, e te sustento com a destra da minha justiça." },
  { tema: "ansiedade", referencia: "Filipenses 4:6-7",    texto: "Não andeis ansiosos por coisa alguma; em tudo, porém, sejam conhecidas, diante de Deus, as vossas petições." },
  { tema: "ansiedade", referencia: "1 Pedro 5:7",         texto: "Lançai sobre ele toda a vossa ansiedade, porque ele tem cuidado de vós." },
  { tema: "tristeza",  referencia: "Salmos 34:18",        texto: "Perto está o Senhor dos que têm o coração quebrantado e salva os de espírito oprimido." },
  { tema: "tristeza",  referencia: "João 16:22",          texto: "Agora, vós estais tristes; mas tornarei a ver-vos, e o vosso coração se alegrará." },
  { tema: "solidão",   referencia: "Deuteronômio 31:6",   texto: "Sede fortes e corajosos. Não temais nem vos espanteis diante deles, porque o Senhor, teu Deus, vai contigo; não te deixará nem te abandonará." },
  { tema: "solidão",   referencia: "Mateus 28:20",        texto: "E eis que estou convosco todos os dias até a consumação dos séculos." },
  { tema: "fé",        referencia: "Hebreus 11:1",        texto: "A fé é a certeza das coisas que se esperam e a convicção das coisas que se não vêem." },
  { tema: "fé",        referencia: "Romanos 10:17",       texto: "A fé vem pelo ouvir, e o ouvir pela palavra de Deus." },
  { tema: "cansaço",   referencia: "Mateus 11:28",        texto: "Vinde a mim, todos os que estais cansados e sobrecarregados, e eu vos aliviarei." },
  { tema: "cansaço",   referencia: "Isaías 40:31",        texto: "Mas os que esperam no Senhor renovam as suas forças e sobem com asas como águias." },
  { tema: "pecado",    referencia: "1 João 1:9",          texto: "Se confessarmos os nossos pecados, ele é fiel e justo para nos perdoar os pecados e nos purificar de toda injustiça." },
  { tema: "pecado",    referencia: "Salmos 103:12",       texto: "Assim como o oriente está longe do ocidente, assim ele afasta de nós as nossas transgressões." },
  { tema: "gratidão",  referencia: "1 Tessalonicenses 5:18", texto: "Em tudo dai graças, porque esta é a vontade de Deus em Cristo Jesus para convosco." },
  { tema: "gratidão",  referencia: "Salmos 100:4",        texto: "Entrai pelos seus átrios com ação de graças, e nos seus átrios com louvor; dai-lhe graças e bendizei o seu nome." },
  { tema: "geral",     referencia: "Jeremias 29:11",      texto: "Porque eu bem sei os pensamentos que tenho a vosso respeito, diz o Senhor; pensamentos de paz e não de mal, para vos dar um futuro e uma esperança." },
  { tema: "geral",     referencia: "Provérbios 3:5-6",    texto: "Confia no Senhor de todo o teu coração e não te estribes no teu próprio entendimento. Reconhece-o em todos os teus caminhos, e ele endireitará as tuas veredas." },
];

const versiculosDoDia = [
  { referencia: "Salmos 23:1",    texto: "O Senhor é o meu pastor; nada me faltará." },
  { referencia: "João 3:16",      texto: "Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito." },
  { referencia: "Romanos 8:28",   texto: "Sabemos que todas as coisas cooperam para o bem daqueles que amam a Deus." },
  { referencia: "Salmos 46:1",    texto: "Deus é o nosso refúgio e força, socorro bem presente na angústia." },
  { referencia: "Filipenses 4:13",texto: "Posso todas as coisas naquele que me fortalece." },
  { referencia: "João 14:27",     texto: "A minha paz vos dou; não vo-la dou como o mundo a dá." },
  { referencia: "Josué 1:9",      texto: "Não te ordenei eu? Sê forte e corajoso. Não te atemorizes, nem te espantes." },
];

// ── Versículo do dia (baseado no dia da semana) ──
function mostrarVersiculoDoDia() {
  const idx = new Date().getDay();
  const v = versiculosDoDia[idx];
  document.getElementById('verseText').textContent = `"${v.texto}"`;
  document.getElementById('verseRef').textContent = `— ${v.referencia}`;
}

// ── Detectar tema a partir do texto ──
function detectarTema(texto) {
  const t = texto.toLowerCase();
  const mapa = {
    medo:      ['medo','assustado','temor','receio','pavor','aterrorizado'],
    ansiedade: ['ansiedade','ansioso','preocup','angústia','angustia','nervoso','aflito'],
    tristeza:  ['triste','tristeza','chorar','choro','lágrima','lagrima','deprimido','depressão'],
    solidão:   ['sozinho','solidão','solitude','abandonado','isolado'],
    fé:        ['fé','fe','esperança','esperanca','acreditar','crer','dúvida','duvida'],
    cansaço:   ['cansado','cansaço','exausto','exaustão','esgotado','fatigado'],
    pecado:    ['pecado','culpa','errei','erro','vergonha','arrependimento','arrependido'],
    gratidão:  ['gratidão','grato','agradecer','agradecido','bênção','bencao','obrigado'],
  };
  for (const [tema, palavras] of Object.entries(mapa)) {
    if (palavras.some(p => t.includes(p))) return tema;
  }
  return 'geral';
}

// ── Buscar versículo para o tema ──
function buscarVersiculo(tema) {
  const filtrados = versiculos.filter(v => v.tema === tema || v.tema === 'geral');
  return filtrados[Math.floor(Math.random() * filtrados.length)];
}

// ── Histórico local ──
let historico = JSON.parse(localStorage.getItem('mentor_historico') || '[]');

function salvarHistorico(entrada, ref, resposta) {
  historico.unshift({ entrada: entrada.slice(0,80), ref, resposta, data: new Date().toLocaleDateString('pt-BR') });
  if (historico.length > 5) historico = historico.slice(0, 5);
  localStorage.setItem('mentor_historico', JSON.stringify(historico));
  renderHistorico();
}

function renderHistorico() {
  if (historico.length === 0) return;
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = 'block';
  list.innerHTML = historico.map(h => `
    <div class="history-item">
      <div class="history-item-dot"></div>
      <div>
        <div class="history-item-text">"${h.entrada}…"</div>
        <div class="history-item-ref">${h.ref} · ${h.data}</div>
      </div>
    </div>
  `).join('');
}

// ── Selecionar tema rápido ──
function selectTheme(btn, texto) {
  document.querySelectorAll('.theme-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('userInput').value = texto;
}

// ── Animação de digitação ──
async function typeText(el, text, delay=18) {
  el.textContent = '';
  for (const char of text) {
    el.textContent += char;
    await new Promise(r => setTimeout(r, delay));
  }
}

// ══════════════════════════════
// CHAMADA À IA (Claude API)
// ══════════════════════════════
async function receberConselho() {
  const input = document.getElementById('userInput').value.trim();
  if (!input) {
    document.getElementById('userInput').focus();
    return;
  }

  const tema = detectarTema(input);
  const versiculo = buscarVersiculo(tema);

  // UI states
  const btn = document.getElementById('btnPray');
  const loading = document.getElementById('loading');
  const card = document.getElementById('responseCard');
  const errorEl = document.getElementById('errorMsg');

  btn.disabled = true;
  loading.classList.add('active');
  card.classList.remove('visible');
  errorEl.classList.remove('visible');

  const systemPrompt = `Você é um mentor espiritual cristão sábio, compassivo e profundamente humano. 
Responda sempre em português brasileiro, com calor e empatia genuína.

Para cada resposta, gere um JSON com exatamente estas três chaves:
{
  "conselho": "Uma mensagem espiritual personalizada de 3 a 5 frases. Seja específico ao que a pessoa disse. Use linguagem bonita, poética e reconfortante. Mencione Deus com naturalidade.",
  "oracao": "Uma oração curta (3-4 linhas) personalizada para a situação da pessoa. Em primeira pessoa do plural. Começa com 'Senhor' ou 'Pai'.",
  "versiculo_adicional": "Um versículo bíblico relevante curto, diferente do já mencionado. Formato: 'texto — Livro capítulo:versículo'"
}

Responda APENAS com o JSON. Sem markdown, sem explicações, sem texto extra.`;

  const userMessage = `A pessoa escreveu: "${input}"
O tema principal detectado é: ${tema}
O versículo já apresentado é: ${versiculo.referencia} — "${versiculo.texto}"

Gere o JSON com conselho, oração e versículo adicional.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userMessage }]
      })
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);

    const data = await response.json();
    const rawText = data.content.map(b => b.text || '').join('');
    const clean = rawText.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Preencher card
    loading.classList.remove('active');

    document.getElementById('scriptureVerse').textContent = `"${versiculo.texto}"`;
    document.getElementById('scriptureRef').textContent = `— ${versiculo.referencia}`;

    const aiEl = document.getElementById('aiMessage');
    const prayerEl = document.getElementById('prayerText');

    aiEl.textContent = '';
    prayerEl.textContent = '';

    card.classList.add('visible');

    // Animar textos
    await typeText(aiEl, parsed.conselho, 14);

    if (parsed.versiculo_adicional) {
      aiEl.textContent += `\n\n✦ ${parsed.versiculo_adicional}`;
    }

    await typeText(prayerEl, parsed.oracao, 16);

    salvarHistorico(input, versiculo.referencia, parsed.conselho);

  } catch (err) {
    loading.classList.remove('active');
    errorEl.textContent = '⚠️ Não foi possível conectar ao mentor. Verifique sua conexão e tente novamente.';
    errorEl.classList.add('visible');
    console.error(err);

    // Fallback sem IA
    usarFallback(versiculo, tema, input);
  }

  btn.disabled = false;
}
